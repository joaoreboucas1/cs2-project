  DES_BTA_1:
    prior:
      min: 0
      max: 2
    ref:
      dist: norm
      loc: 1
      scale: 0.15
    proposal: 0.1
theory:
  camb:
    path: ./external_modules/code/CAMB-cs2
    use_renames: true
    extra_args:
      AccuracyBoost: 1.05
      num_massive_neutrinos: 1
      dark_energy_model: ppf
      use_cs2: true
      alpha_K_parametrization: 2
sampler:
  mcmc:
    covmat: ./projects/cs2-project/desi_lipop_sn.covmat
    covmat_params: null
    learn_proposal: true
    learn_proposal_Rminus1_min: 0.035
    learn_proposal_Rminus1_max: 4.0
    learn_proposal_Rminus1_max_early: 30.0
    max_samples: .inf
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.12
    Rminus1_cl_level: 0.95
    measure_speeds: true
    drag: false
    oversample_power: 0
    oversample_thin: true
    max_tries: 3000
    burn_in: 0
    Rminus1_single_split: 4
